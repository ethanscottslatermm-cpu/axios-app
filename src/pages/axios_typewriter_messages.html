
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .stage { display: flex; flex-direction: column; align-items: center; padding: 2rem 0; }
  .phone {
    border-radius: 48px;
    border: 1.5px solid rgba(255,255,255,0.1);
    width: 220px; height: 440px;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #060608;
  }

  .bg-canvas { position: absolute; inset: 0; overflow: hidden; }
  .orb { position: absolute; border-radius: 50%; filter: blur(38px); opacity: 0; animation: orb-drift linear infinite; }
  .orb1 { width:160px; height:160px; background:radial-gradient(circle,rgba(180,180,210,0.22) 0%,transparent 70%); top:-40px; left:-30px; animation-duration:9s; animation-delay:0s; }
  .orb2 { width:120px; height:120px; background:radial-gradient(circle,rgba(140,140,175,0.18) 0%,transparent 70%); bottom:20px; right:-20px; animation-duration:11s; animation-delay:-4s; }
  .orb3 { width:90px; height:90px; background:radial-gradient(circle,rgba(200,200,230,0.15) 0%,transparent 70%); top:50%; left:60%; animation-duration:13s; animation-delay:-7s; }
  @keyframes orb-drift {
    0%{ opacity:0; transform:translate(0,0) scale(1); } 15%{ opacity:1; }
    50%{ transform:translate(18px,22px) scale(1.08); } 85%{ opacity:1; }
    100%{ opacity:0; transform:translate(-8px,40px) scale(0.95); }
  }
  .smoke-wrap { position:absolute; inset:0; }
  .smoke { position:absolute; border-radius:50%; background:rgba(200,200,220,0.06); filter:blur(12px); animation:rise linear infinite; }
  .s1{width:50px;height:50px;left:15%;bottom:-60px;animation-duration:7s;animation-delay:0s}
  .s2{width:35px;height:35px;left:45%;bottom:-60px;animation-duration:9s;animation-delay:-2s}
  .s3{width:60px;height:60px;left:70%;bottom:-60px;animation-duration:11s;animation-delay:-5s}
  .s4{width:28px;height:28px;left:30%;bottom:-60px;animation-duration:8s;animation-delay:-3.5s}
  .s5{width:44px;height:44px;left:80%;bottom:-60px;animation-duration:10s;animation-delay:-1s}
  @keyframes rise {
    0%{ transform:translateY(0) translateX(0) scale(1); opacity:0; } 10%{ opacity:1; }
    60%{ transform:translateY(-260px) translateX(15px) scale(1.6); opacity:0.5; }
    100%{ transform:translateY(-480px) translateX(-10px) scale(2.2); opacity:0; }
  }
  .scanline {
    position:absolute; width:100%; height:1px;
    background:linear-gradient(90deg,transparent 0%,rgba(220,220,255,0.12) 30%,rgba(255,255,255,0.25) 50%,rgba(220,220,255,0.12) 70%,transparent 100%);
    animation:scan 5s ease-in-out infinite; top:0;
  }
  @keyframes scan {
    0%{ top:0%; opacity:0; } 5%{ opacity:1; } 95%{ opacity:1; } 100%{ top:100%; opacity:0; }
  }

  .content { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; }
  .logo-wrap { position:relative; width:190px; height:70px; }
  .logo-wrap svg { width:100%; height:100%; overflow:visible; }

  .bar-wrap { width:100px; height:1px; background:rgba(200,200,220,0.08); border-radius:1px; margin-top:20px; overflow:hidden; }
  .bar { height:100%; width:40%; background:linear-gradient(90deg,transparent,rgba(220,220,240,0.9),transparent); animation:bar-slide 2.4s ease-in-out infinite; }
  @keyframes bar-slide {
    0%{ transform:translateX(-200%); } 100%{ transform:translateX(500%); }
  }

  /* typewriter container */
  .msg-wrap {
    margin-top: 24px;
    width: 180px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #typewriter {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: rgba(210,210,230,0.75);
    white-space: nowrap;
    overflow: hidden;
    border-right: 1px solid rgba(210,210,230,0.6);
    width: 0;
    opacity: 1;
  }
</style>

<div class="stage">
  <div class="phone">
    <div class="bg-canvas">
      <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
      <div class="smoke-wrap">
        <div class="smoke s1"></div><div class="smoke s2"></div>
        <div class="smoke s3"></div><div class="smoke s4"></div><div class="smoke s5"></div>
      </div>
      <div class="scanline"></div>
    </div>

    <div class="content">
      <div class="logo-wrap">
        <svg viewBox="0 0 380 70" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%"  stop-color="#3a3a42"/>
              <stop offset="42%" stop-color="#8a8a96"/>
              <stop offset="50%" stop-color="#ffffff"/>
              <stop offset="58%" stop-color="#8a8a96"/>
              <stop offset="100%" stop-color="#3a3a42"/>
              <animate attributeName="x1" from="-380" to="380" dur="2.8s" repeatCount="indefinite"/>
              <animate attributeName="x2" from="0" to="760" dur="2.8s" repeatCount="indefinite"/>
            </linearGradient>
          </defs>
          <polygon points="10,62 45,4 80,62" fill="none" stroke="url(#sg)" stroke-width="3.5" stroke-linejoin="round"/>
          <polygon points="22,62 45,20 68,62" fill="none" stroke="url(#sg)" stroke-width="2.5" stroke-linejoin="round"/>
          <text x="100" y="52" font-family="Georgia,'Times New Roman',serif" font-size="42" font-weight="700" letter-spacing="5" fill="url(#sg)">AXIOS</text>
          <polygon points="300,62 335,4 370,62" fill="none" stroke="url(#sg)" stroke-width="3.5" stroke-linejoin="round"/>
          <polygon points="312,62 335,20 358,62" fill="none" stroke="url(#sg)" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="bar-wrap"><div class="bar"></div></div>

      <div class="msg-wrap">
        <span id="typewriter"></span>
      </div>
    </div>
  </div>
</div>

<script>
  const messages = [
    "Welcome to AXIOS",
    "Logging in securely",
    "Loading your settings",
    "Initializing"
  ];

  const el = document.getElementById('typewriter');
  let msgIndex = 0;

  const CHAR_SPEED = 55;    // ms per character typed
  const HOLD       = 900;   // ms to hold after fully typed
  const ERASE_SPEED = 30;   // ms per character erased
  const PAUSE      = 400;   // ms pause before next message

  function type(text, i, done) {
    if (i <= text.length) {
      el.style.width = 'auto';
      el.textContent = text.slice(0, i);
      setTimeout(() => type(text, i + 1, done), CHAR_SPEED);
    } else {
      setTimeout(done, HOLD);
    }
  }

  function erase(text, i, done) {
    if (i >= 0) {
      el.textContent = text.slice(0, i);
      setTimeout(() => erase(text, i - 1, done), ERASE_SPEED);
    } else {
      // fully erased — hide cursor briefly then move on
      el.style.borderRight = 'none';
      setTimeout(() => {
        el.style.borderRight = '1px solid rgba(210,210,230,0.6)';
        done();
      }, PAUSE);
    }
  }

  function run() {
    const msg = messages[msgIndex % messages.length];
    msgIndex++;
    type(msg, 0, () => {
      erase(msg, msg.length, () => {
        run();
      });
    });
  }

  // cursor blink
  setInterval(() => {
    el.style.borderRightColor =
      el.style.borderRightColor === 'transparent'
        ? 'rgba(210,210,230,0.6)'
        : 'transparent';
  }, 500);

  run();
</script>
